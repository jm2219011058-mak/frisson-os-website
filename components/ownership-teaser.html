<!--
  Component: "More than ownership" teaser (dark CTA block)
  Origin: src/cities.html (hidden 2026-07 per request — kept for later re-use)
  Uses i18n tokens: hiw.title / hiw.p1 / hiw.p2 / hiw.p3 / hiw.discover
  To restore: paste this block back into cities.html where the
  "<!-- ownership teaser hidden ... -->" comment marker is, and un-comment.
-->
<style>
.ownership{background:#0b0a08;padding:clamp(60px,10vh,110px) 0 clamp(60px,10vh,110px);font-family:var(--sans);}
.own-in{max-width:1180px;margin:0 auto;padding:0 clamp(24px,6vw,80px);}
.own-text{max-width:640px;}
.own-title{font-family:var(--serif);font-weight:400;font-size:clamp(34px,5.5vw,64px);line-height:1.05;letter-spacing:.005em;color:#fff;margin:0 0 clamp(30px,5vh,50px);}
.own-list{display:flex;flex-direction:column;gap:clamp(14px,2.4vh,22px);margin:0 0 clamp(34px,5.5vh,52px);}
.own-list p{font-family:var(--serif);font-size:clamp(18px,2.1vw,26px);line-height:1.3;color:rgba(244,236,220,.78);margin:0;}
.own-cta{display:inline-flex;align-items:center;gap:9px;font-family:var(--sans);font-weight:600;font-size:clamp(14px,1.6vw,16px);letter-spacing:.02em;color:#fff;background:var(--accent);text-decoration:none;padding:14px 32px;border-radius:999px;box-shadow:0 10px 26px rgba(224,123,60,.3);transition:transform .25s,box-shadow .25s;}
.own-cta:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(224,123,60,.42);}
.own-cta i{font-style:normal;transition:transform .25s;}
.own-cta:hover i{transform:translateX(3px);}
.own-fig{margin:0;position:relative;border-radius:16px;overflow:hidden;aspect-ratio:4/5;background:#f4f0ea;border:1px solid var(--hair);}
.own-fig img{width:100%;height:100%;object-fit:cover;display:block;}
.own-fig .own-ph{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-family:var(--sans);font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);background:repeating-linear-gradient(45deg,#f4f0ea,#f4f0ea 12px,#efe8dd 12px,#efe8dd 24px);}
.own-fig.empty .own-ph{display:flex;}
@media(max-width:820px){.own-in{grid-template-columns:1fr;gap:clamp(26px,5vh,40px);}.own-fig{aspect-ratio:16/11;order:-1;}}
</style>
<section class="ownership reveal">
  <div class="own-in">
    <div class="own-text">
      <h2 class="own-title">{{hiw.title}}</h2>
      <div class="own-list">
        <p>{{hiw.p1}}</p>
        <p>{{hiw.p2}}</p>
        <p>{{hiw.p3}}</p>
      </div>
      <a class="own-cta" href="howitworks.html">{{hiw.discover}} <i aria-hidden="true">&rsaquo;</i></a>
    </div>
  </div>
</section>
