<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{stories.title}}</title>
<meta name="description" content="The future of AI begins with how we live — Frisson on living data, privacy-first intelligence, and more-than-human cities.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff;--ink:#2b1d12;--ink-soft:#5b4a3b;--accent:#e07b3c;--hair:rgba(43,29,18,.12);
    --serif:"Playfair Display","Noto Serif SC",serif;
    --sans:-apple-system,"Helvetica Neue","Segoe UI",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;overflow-x:clip;}
  body{overflow-x:clip;background:var(--bg);color:var(--ink);font-family:var(--serif);-webkit-font-smoothing:antialiased;}

  /* nav — white, sticky */
  .nav{position:sticky;top:0;z-index:60;display:flex;align-items:center;justify-content:space-between;
    padding:18px clamp(20px,5vw,64px);background:#fff;border-bottom:1px solid var(--hair);}
  .nav .brand{font-size:clamp(18px,2.4vw,24px);letter-spacing:.14em;color:var(--ink);text-decoration:none;font-weight:500;}
  .nav .brand .o{color:var(--accent);}
  .nav .links{display:flex;gap:clamp(18px,3vw,46px);}
  .nav .links a{font-family:var(--sans);font-size:clamp(12px,1.1vw,15px);letter-spacing:.02em;color:var(--ink);text-decoration:none;transition:color .25s;white-space:nowrap;}
  .nav .links a:hover,.nav .links a.cur{color:var(--accent);}
  .menu-btn{display:none;flex-direction:column;justify-content:center;gap:6px;width:36px;height:36px;background:transparent;border:0;cursor:pointer;padding:0;}
  .menu-btn span{display:block;width:24px;height:2px;background:#2b1d12;border-radius:2px;transition:transform .3s;}
  .menu-btn.open span:nth-child(1){transform:translateY(4px) rotate(45deg);}
  .menu-btn.open span:nth-child(2){transform:translateY(-4px) rotate(-45deg);}
  .menu{display:flex;position:absolute;top:100%;right:clamp(16px,5vw,44px);margin-top:12px;flex-direction:column;gap:10px;z-index:70;
    opacity:0;pointer-events:none;transform:translateY(-10px);
    transition:opacity .25s ease, transform .4s cubic-bezier(.34,1.56,.64,1);}
  .menu.open{opacity:1;pointer-events:auto;transform:none;}
  .menu a{background:var(--accent);color:#fff;text-decoration:none;text-align:center;padding:12px 24px;border-radius:999px;font-family:var(--sans);font-weight:500;font-size:15px;letter-spacing:.01em;white-space:nowrap;box-shadow:0 10px 26px rgba(224,123,60,.35);
    opacity:0;transform:translateX(26px);transition:opacity .3s ease, transform .45s cubic-bezier(.34,1.56,.64,1);}
  .menu.open a{opacity:1;transform:none;}
  .menu.open a:nth-child(1){transition-delay:.04s;}
  .menu.open a:nth-child(2){transition-delay:.10s;}
  .menu.open a:nth-child(3){transition-delay:.16s;}
  .menu.open a:nth-child(4){transition-delay:.22s;}
  .menu.open a:nth-child(5){transition-delay:.28s;}
  @media(min-width:681px){.menu{display:none;}}
  @media (max-width:680px){ .nav .links{display:none;} .menu-btn{display:flex;} }

  /* story article */
  .story{max-width:760px;margin:0 auto;padding:clamp(84px,14vh,150px) clamp(24px,6vw,40px) clamp(80px,13vh,150px);}
  .st-eyebrow{font-family:var(--sans);font-weight:500;font-size:clamp(11px,1.2vw,13px);letter-spacing:.26em;text-transform:uppercase;color:var(--accent);margin:0 0 clamp(30px,5vh,50px);text-align:center;}
  .st-h{font-family:var(--serif);font-weight:700;font-size:clamp(27px,4vw,44px);line-height:1.22;letter-spacing:.01em;color:var(--ink);
    margin:clamp(56px,10vh,104px) 0 clamp(18px,3vh,30px);}
  .story .st-h:first-of-type{margin-top:0;}
  .st-h-final{color:var(--accent);}
  .st-p{font-family:var(--serif);font-size:clamp(16.5px,1.45vw,19px);line-height:1.95;color:var(--ink-soft);margin:0 0 1.05em;}
  .st-note{font-family:var(--serif);font-style:italic;font-size:clamp(14px,1.2vw,16px);line-height:1.85;color:var(--ink-soft);margin:0 0 clamp(16px,2.4vh,24px);}
  .st-date{font-family:var(--sans);font-size:clamp(12px,1.05vw,13px);letter-spacing:.1em;color:#a9a29a;margin:0 0 clamp(40px,7vh,72px);}
  .st-list{list-style:none;padding:0;margin:.4em 0 1.5em;}
  .st-list li{font-family:var(--serif);font-size:clamp(16.5px,1.45vw,19px);line-height:1.9;color:var(--ink-soft);position:relative;padding-left:1.2em;margin:0 0 .5em;}
  .st-list li::before{content:"";position:absolute;left:.1em;top:.85em;width:5px;height:5px;border-radius:50%;background:var(--accent);}

  .st-quote{font-family:var(--serif);font-style:italic;font-weight:400;color:#a9a29a;
    font-size:clamp(13.5px,1.25vw,16px);line-height:1.75;letter-spacing:.01em;text-align:center;
    max-width:34ch;margin:clamp(64px,12vh,120px) auto 0;padding:0;border:0;}

  /* footer — light */
  .st-foot{border-top:1px solid var(--hair);text-align:center;padding:30px clamp(24px,6vw,40px);
    font-family:var(--sans);font-size:13px;letter-spacing:.02em;color:var(--ink-soft);}
</style>
</head>
<body>

  <nav class="nav">
    <a class="brand" href="index.html">FRISS<span class="o">O</span>N</a>
    <div class="links">
      <a href="cities.html">{{nav.cities}}</a>
      <a href="sona.html">{{nav.sona}}</a>
      <a href="howitworks.html">{{nav.ownership}}</a>
      <a href="advocater.html">{{nav.advocater}}</a>
      <a href="stories.html" class="cur">{{nav.stories}}</a>
    </div>
    <button class="menu-btn" id="menuBtn" aria-label="Menu"><span></span><span></span></button>
    <div class="menu" id="menu">
      <a href="cities.html">{{nav.cities}}</a>
      <a href="sona.html">{{nav.sona}}</a>
      <a href="howitworks.html">{{nav.ownership}}</a>
      <a href="advocater.html">{{nav.advocater}}</a>
      <a href="stories.html">{{nav.stories}}</a>
    </div>
    <!--LANGNAV-->
  </nav>

  <main>
    <article class="story">
      <p class="st-eyebrow">{{nav.stories}}</p>
      {{stories.body}}
    </article>
  </main>

  <footer class="st-foot">© FRISSON</footer>

  <script>
    (function(){ var b=document.getElementById('menuBtn'), m=document.getElementById('menu'); if(!b||!m) return;
      b.addEventListener('click',function(){ var o=m.classList.toggle('open'); b.classList.toggle('open',o); });
      m.addEventListener('click',function(){ m.classList.remove('open'); b.classList.remove('open'); });
    })();
    (function(){ var el=document.getElementById('stDate'); if(!el) return;
      var lang=(document.documentElement.lang||'en').indexOf('zh')===0?'zh-CN':'en-US';
      var now=new Date();
      var d=now.toLocaleDateString(lang,{year:'numeric',month:'long',day:'numeric'});
      var t=now.toLocaleTimeString(lang,{hour:'2-digit',minute:'2-digit'});
      el.textContent=d+' · '+t;
    })();
  </script>
</body>
</html>
