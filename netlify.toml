# Netlify config — multilingual static build.
# The build machine turns src/ templates + the translation table into
# EN (root) and ZH (/zh/) pages, output to /dist which Netlify publishes.
[build]
  command = "node gen-i18n.mjs && node build.mjs"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Assets: cache but revalidate, so updates at the same filename still propagate.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Baseline security headers (help scanners/clients trust the site)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
