# Netlify config — multilingual static build.
# The build machine turns src/ templates + the translation table into
# EN (root) and ZH (/zh/) pages, output to /dist which Netlify publishes.
[build]
  command = "node gen-i18n.mjs && node build.mjs"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Serverless functions (Frisson Fellow wall: /api/fellows, backed by Netlify Blobs)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Assets: cache 30 days (updates ride a ?v= bump); revalidate after expiry so same-filename changes still propagate.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, must-revalidate"

# Third-party libraries never change at the same path → cache a full year, immutable.
[[headers]]
  for = "/assets/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Baseline security headers (help scanners/clients trust the site)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
